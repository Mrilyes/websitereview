<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="googlebot" content="noindex, nofollow" />
    <meta name="bingbot" content="noindex, nofollow" />
    <title>Testing Review</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --primary: #5c6bc0;
        --primary-dark: #4a59b0;
        --border: #e8e8e8;
        --sidebar-w: 300px;
        --toolbar-h: 52px;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Toolbar ── */
      .toolbar {
        height: var(--toolbar-h);
        min-height: var(--toolbar-h);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 16px;
        background: #fff;
        border-bottom: 1px solid var(--border);
        z-index: 200;
        flex-shrink: 0;
      }
      .logo {
        font-weight: 800;
        font-size: 15px;
        color: var(--primary);
        white-space: nowrap;
        letter-spacing: -0.3px;
      }
      .url-input {
        flex: 1;
        padding: 7px 12px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 13px;
        outline: none;
        min-width: 0;
        transition: border-color 0.15s;
      }
      .url-input:focus {
        border-color: var(--primary);
      }
      .btn {
        padding: 7px 16px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.15s;
        white-space: nowrap;
      }
      .btn-primary {
        background: var(--primary);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--primary-dark);
      }
      .btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .mode-toggle {
        display: flex;
        background: #f0f0f0;
        border-radius: 8px;
        padding: 3px;
        gap: 2px;
      }
      .mode-btn {
        padding: 5px 14px;
        border: none;
        background: transparent;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        color: #666;
        font-weight: 500;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .mode-btn.active {
        background: #fff;
        color: var(--primary);
        font-weight: 600;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
      }
      .toolbar-status {
        font-size: 12px;
        color: #999;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 200px;
      }

      /* ── Main layout ── */
      .main {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      /* ── Sidebar ── */
      .sidebar {
        width: var(--sidebar-w);
        min-width: var(--sidebar-w);
        background: #fff;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition:
          width 0.2s,
          min-width 0.2s;
      }
      .sidebar.collapsed {
        width: 0;
        min-width: 0;
      }
      .sidebar-header {
        padding: 14px 16px 10px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .sidebar-site {
        font-size: 13px;
        font-weight: 700;
        color: #333;
        margin-bottom: 6px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .sidebar-tabs {
        display: flex;
        gap: 0;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        padding: 0 16px;
      }
      .sidebar-tab {
        padding: 8px 0;
        font-size: 12px;
        font-weight: 600;
        color: #999;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-right: 16px;
        transition: all 0.15s;
      }
      .sidebar-tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
      }
      .sidebar-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #f0f0f0;
        color: #666;
        border-radius: 10px;
        padding: 1px 7px;
        font-size: 11px;
        margin-left: 5px;
      }
      .sidebar-count.has-items {
        background: var(--primary);
        color: white;
      }
      .comments-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
      }
      .empty-comments {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 200px;
        color: #bbb;
        font-size: 13px;
        text-align: center;
        padding: 20px;
        gap: 10px;
      }
      .empty-comments svg {
        opacity: 0.3;
      }

      /* ── Comment card ── */
      .comment-card {
        padding: 12px 16px;
        border-bottom: 1px solid #f5f5f5;
        cursor: pointer;
        transition: background 0.1s;
        position: relative;
      }
      .comment-card:hover {
        background: #fafafa;
      }
      .comment-card.active {
        background: #f0f3ff;
      }
      .comment-card-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .comment-pin-badge {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--primary);
        color: white;
        font-size: 11px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .comment-pin-badge.resolved {
        background: #4caf50;
      }
      .comment-author {
        font-size: 12px;
        font-weight: 600;
        color: #333;
      }
      .comment-time {
        font-size: 11px;
        color: #bbb;
        margin-left: auto;
      }
      .comment-text {
        font-size: 13px;
        color: #555;
        line-height: 1.45;
        word-break: break-word;
      }
      .comment-actions {
        display: flex;
        gap: 6px;
        margin-top: 8px;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .comment-card:hover .comment-actions {
        opacity: 1;
      }
      .comment-action-btn {
        font-size: 11px;
        padding: 3px 8px;
        border: 1px solid var(--border);
        border-radius: 5px;
        background: white;
        cursor: pointer;
        color: #666;
        transition: all 0.15s;
      }
      .comment-action-btn:hover {
        border-color: var(--primary);
        color: var(--primary);
      }
      .comment-action-btn.delete:hover {
        border-color: #ef4444;
        color: #ef4444;
      }

      /* ── Iframe area ── */
      .iframe-area {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: #e8e8e8;
      }
      .iframe-wrap {
        width: 100%;
        height: 100%;
        position: relative;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }
      .empty-state {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #ccc;
        text-align: center;
        gap: 12px;
      }
      .empty-state h2 {
        font-size: 20px;
        color: #bbb;
      }
      .empty-state p {
        font-size: 14px;
        color: #ccc;
      }

      /* ── Sidebar toggle ── */
      .sidebar-toggle {
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 40px;
        background: #fff;
        border: 1px solid var(--border);
        border-left: none;
        border-radius: 0 6px 6px 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        color: #bbb;
        transition: color 0.15s;
      }
      .sidebar-toggle:hover {
        color: var(--primary);
      }

      /* Comment mode - no pointer-events blocking, iframe handles clicks internally */
      .iframe-wrap.comment-mode {
        cursor: crosshair;
      }
    </style>
  </head>
  <body>
    <script>
      if (window !== window.top) {
        document.documentElement.innerHTML = "";
        throw 0;
      }
    </script>

    <!-- ── Toolbar ── -->
    <div class="toolbar">
      <span class="logo">Testing Review</span>
      <input
        class="url-input"
        id="urlInput"
        type="text"
        placeholder="Enter URL... e.g. https://example.com"
      />
      <button class="btn btn-primary" id="loadBtn" onclick="loadUrl()">
        Load
      </button>
      <div class="mode-toggle">
        <button
          class="mode-btn active"
          id="browseBtn"
          onclick="setMode('browse')"
        >
          Browse
        </button>
        <button class="mode-btn" id="commentBtn" onclick="setMode('comment')">
          Comment
        </button>
      </div>
      <span class="toolbar-status" id="status">Enter a URL to get started</span>
    </div>

    <!-- ── Main ── -->
    <div class="main">
      <!-- Sidebar -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-site" id="sidebarSite">—</div>
        </div>
        <div class="sidebar-tabs">
          <div
            class="sidebar-tab active"
            id="tabActive"
            onclick="switchTab('active')"
          >
            Active
            <span class="sidebar-count has-items" id="countActive">0</span>
          </div>
          <div
            class="sidebar-tab"
            id="tabResolved"
            onclick="switchTab('resolved')"
          >
            Resolved <span class="sidebar-count" id="countResolved">0</span>
          </div>
        </div>
        <div class="comments-list" id="commentsList">
          <div class="empty-comments" id="emptyComments">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <rect
                x="5"
                y="8"
                width="30"
                height="22"
                rx="4"
                stroke="#bbb"
                stroke-width="1.5"
              />
              <path
                d="M13 28l3 4 4-4"
                stroke="#bbb"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <line
                x1="12"
                y1="16"
                x2="28"
                y2="16"
                stroke="#bbb"
                stroke-width="1.5"
                stroke-linecap="round"
              />
              <line
                x1="12"
                y1="21"
                x2="22"
                y2="21"
                stroke="#bbb"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
            <div>
              Switch to <strong>Comment</strong> mode<br />and click anywhere to
              leave a note
            </div>
          </div>
        </div>
      </div>

      <!-- Iframe area -->
      <div class="iframe-area">
        <button
          class="sidebar-toggle"
          id="sidebarToggle"
          onclick="toggleSidebar()"
          title="Toggle sidebar"
        >
          ‹
        </button>
        <div class="iframe-wrap" id="iframeWrap">
          <div class="empty-state" id="emptyState">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <rect
                x="4"
                y="8"
                width="40"
                height="32"
                rx="4"
                stroke="#ddd"
                stroke-width="2"
              />
              <line
                x1="4"
                y1="16"
                x2="44"
                y2="16"
                stroke="#ddd"
                stroke-width="2"
              />
              <circle cx="10" cy="12" r="2" fill="#ddd" />
              <circle cx="16" cy="12" r="2" fill="#ddd" />
              <circle cx="22" cy="12" r="2" fill="#ddd" />
            </svg>
            <h2>Testing Review</h2>
            <p>Enter any URL above and click Load</p>
          </div>
          <iframe
            id="proxyFrame"
            sandbox="allow-scripts allow-forms allow-same-origin allow-pointer-lock allow-presentation allow-popups allow-popups-to-escape-sandbox"
          >
          </iframe>
        </div>
      </div>
    </div>

    <script>
      // ── State ──────────────────────────────────────────────────────
      let mode = "browse";
      let currentSessionId = null;
      let currentUrl = null;
      let pins = []; // { id, number, comment, xpath, offsetX, offsetY, timestamp, resolved, author }
      let pinCounter = 0;
      let activeTab = "active";
      let sidebarOpen = true;
      let activeCard = null;

      const urlInput = document.getElementById("urlInput");
      const loadBtn = document.getElementById("loadBtn");
      const proxyFrame = document.getElementById("proxyFrame");
      const status = document.getElementById("status");
      const emptyState = document.getElementById("emptyState");
      const iframeWrap = document.getElementById("iframeWrap");
      const sidebar = document.getElementById("sidebar");
      const sidebarToggle = document.getElementById("sidebarToggle");

      // ── Load URL ───────────────────────────────────────────────────
      urlInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") loadUrl();
      });

      async function loadUrl() {
        let url = urlInput.value.trim();
        if (!url) return;
        if (!url.startsWith("http://") && !url.startsWith("https://")) {
          url = "https://" + url;
          urlInput.value = url;
        }
        loadBtn.disabled = true;
        status.textContent = "Loading...";
        emptyState.style.display = "none";
        pins = [];
        pinCounter = 0;
        renderComments();

        try {
          const res = await fetch("/api/session", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url }),
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          currentSessionId = data.id;
          currentUrl = url;
          document.getElementById("sidebarSite").textContent = new URL(
            url,
          ).hostname;
          proxyFrame.src = data.proxyPath;
          proxyFrame.onload = () => {
            status.textContent = "✓ " + url;
            loadBtn.disabled = false;
            // Tell iframe current mode
            sendToIframe({ __markupType: "SET_MODE", mode });
          };
          setTimeout(() => {
            loadBtn.disabled = false;
          }, 20000);
        } catch (err) {
          status.textContent = "Error: " + err.message;
          loadBtn.disabled = false;
        }
      }

      // ── Mode ───────────────────────────────────────────────────────
      function setMode(m) {
        mode = m;
        document
          .getElementById("browseBtn")
          .classList.toggle("active", mode === "browse");
        document
          .getElementById("commentBtn")
          .classList.toggle("active", mode === "comment");
        iframeWrap.classList.toggle("comment-mode", mode === "comment");
        status.textContent =
          mode === "comment"
            ? "Click anywhere to leave a comment"
            : currentUrl
              ? "✓ " + currentUrl
              : "Enter a URL to get started";
        sendToIframe({ __markupType: "SET_MODE", mode });
      }

      // ── postMessage ────────────────────────────────────────────────
      function sendToIframe(msg) {
        try {
          proxyFrame.contentWindow.postMessage(msg, "*");
        } catch (e) {}
      }

      window.addEventListener("message", (e) => {
        if (!e.data || !e.data.__markupType) return;

        if (e.data.__markupType === "IFRAME_READY") {
          sendToIframe({ __markupType: "SET_MODE", mode });
          if (pins.length) sendToIframe({ __markupType: "LOAD_PINS", pins });
        }

        if (e.data.__markupType === "PIN_CREATED") {
          const pin = {
            ...e.data.pin,
            resolved: false,
            author: "You",
            timestamp: Date.now(),
          };
          pins.push(pin);
          pinCounter = Math.max(pinCounter, pin.number);
          renderComments();
          highlightCard(pin.id);
          // Switch sidebar to show comment
          if (!sidebarOpen) toggleSidebar();
        }

        if (e.data.__markupType === "PIN_CANCELLED") {
          // nothing needed, pin was removed in iframe
        }
      });

      // ── Sidebar toggle ─────────────────────────────────────────────
      function toggleSidebar() {
        sidebarOpen = !sidebarOpen;
        sidebar.classList.toggle("collapsed", !sidebarOpen);
        sidebarToggle.textContent = sidebarOpen ? "‹" : "›";
        sidebarToggle.style.left = sidebarOpen ? "0" : "0";
      }

      // ── Tab ────────────────────────────────────────────────────────
      function switchTab(tab) {
        activeTab = tab;
        document
          .getElementById("tabActive")
          .classList.toggle("active", tab === "active");
        document
          .getElementById("tabResolved")
          .classList.toggle("active", tab === "resolved");
        renderComments();
      }

      // ── Render comments ────────────────────────────────────────────
      function renderComments() {
        const list = document.getElementById("commentsList");
        const empty = document.getElementById("emptyComments");
        const filtered = pins.filter((p) =>
          activeTab === "active" ? !p.resolved : p.resolved,
        );

        // Update counts
        const activeCount = pins.filter((p) => !p.resolved).length;
        const resolvedCount = pins.filter((p) => p.resolved).length;
        const cA = document.getElementById("countActive");
        const cR = document.getElementById("countResolved");
        cA.textContent = activeCount;
        cA.className = "sidebar-count" + (activeCount ? " has-items" : "");
        cR.textContent = resolvedCount;
        cR.className = "sidebar-count" + (resolvedCount ? " has-items" : "");

        // Remove existing cards
        list.querySelectorAll(".comment-card").forEach((el) => el.remove());

        if (!filtered.length) {
          empty.style.display = "flex";
          return;
        }
        empty.style.display = "none";

        filtered.forEach((pin) => {
          const card = document.createElement("div");
          card.className =
            "comment-card" + (activeCard === pin.id ? " active" : "");
          card.dataset.pinId = pin.id;
          card.innerHTML = `
      <div class="comment-card-header">
        <div class="comment-pin-badge ${pin.resolved ? "resolved" : ""}">${pin.number}</div>
        <span class="comment-author">${pin.author || "You"}</span>
        <span class="comment-time">${timeAgo(pin.timestamp)}</span>
      </div>
      <div class="comment-text">${escHtml(pin.comment)}</div>
      <div class="comment-actions">
        ${!pin.resolved ? `<button class="comment-action-btn" onclick="resolvePin('${pin.id}')">✓ Resolve</button>` : `<button class="comment-action-btn" onclick="unresolvePin('${pin.id}')">↺ Reopen</button>`}
        <button class="comment-action-btn delete" onclick="deletePin('${pin.id}')">Delete</button>
      </div>`;
          card.addEventListener("click", (e) => {
            if (e.target.closest(".comment-action-btn")) return;
            highlightCard(pin.id);
            sendToIframe({ __markupType: "HIGHLIGHT_PIN", id: pin.id });
          });
          list.appendChild(card);
        });
      }

      function highlightCard(id) {
        activeCard = id;
        document.querySelectorAll(".comment-card").forEach((el) => {
          el.classList.toggle("active", el.dataset.pinId === id);
        });
      }

      function resolvePin(id) {
        const pin = pins.find((p) => p.id === id);
        if (pin) {
          pin.resolved = true;
          renderComments();
          sendToIframe({ __markupType: "UPDATE_PIN", id, resolved: true });
        }
      }
      function unresolvePin(id) {
        const pin = pins.find((p) => p.id === id);
        if (pin) {
          pin.resolved = false;
          renderComments();
          sendToIframe({ __markupType: "UPDATE_PIN", id, resolved: false });
        }
      }
      function deletePin(id) {
        pins = pins.filter((p) => p.id !== id);
        renderComments();
        sendToIframe({ __markupType: "DELETE_PIN", id });
      }

      // ── Helpers ────────────────────────────────────────────────────
      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function timeAgo(ts) {
        const s = Math.floor((Date.now() - ts) / 1000);
        if (s < 60) return "just now";
        if (s < 3600) return Math.floor(s / 60) + "m ago";
        if (s < 86400) return Math.floor(s / 3600) + "h ago";
        return Math.floor(s / 86400) + "d ago";
      }
    </script>
  </body>
</html>
